<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLayout 3</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topo">
        <div class="logo">
            <img src="github.png" alt="">
        </div>

        <nav class="menu">
            <a href="#">Plataforma</a>
            <a href="#">Soluções</a>
            <a href="#">Recursos</a>
            <a href="#">Código Aberto</a>
            <a href="#">Enterprise</a>
            <a href="#">Preços</a>
        </nav>

        <div class="acoes">
            <button class="lupa">⌕</button>
            <a href="#" class="entar">Entrar</a>
            <button class="btn-conta">Criar uma conta</button>
        </div>
    </header>

    <main>
        <section class="corpo">
            <h1>
                O futuro do desenvolvimento de <br>
                software acontece em conjunto
            </h1>

            <p>
                As ferramentas e as tendências evoluem, mas a colaboração permanece.
                Com o GitHub, desenvolvedores, agentes e código se unem em uma única plataforma.
            </p>

            <div class="formulario">
                <div class="email-box">
                    <input type="email" placeholder="Digite seu e-mail">
                    <button class="btn-verde">Cadastrar-se no GitHub</button>
                </div>

                <button class="btn-outline">
                    Experimente o GitHub Copilot Free
                </button>
            </div>
        </section>
    </main>

</body>
</html>
