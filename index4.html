<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Corrigida</title>
  <style>
    /* Exemplo de como suas classes seriam aplicadas no CSS */
    .a.b.c { display: flex; gap: 20px; padding: 10px; background: #f4f4f4; }
    .post { border: 1px solid #ccc; padding: 20px; margin: 20px 0; }
    .t1 { color: #333; }
    .f1.f2 { text-align: center; padding: 20px; background: #eee; }
  </style>
</head>
<body>

  <header>
    <div id="x1">
      <div class="a b c">
        <span class="l1-wrapper">
          <a href="#" class="l1">Home</a>
        </span>
        <span class="l2-wrapper">
          <a href="#" class="l2">Serviços</a>
        </span>
      </div>
    </div>
  </header>

  <main>
    <div id="x2">
      <div class="wrapper">
        <div class="box">
          <div class="post">
            <div class="inner">
              <h1 class="t t1">Título</h1>
              <p class="txt">Texto do post</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div id="x3">
      <div class="f1 f2">
        <div class="footer-content">
          <p class="r">
            <span class="vrum-text">Roda vrum vrum</span>
          </p>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
